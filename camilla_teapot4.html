<script id="vertex-shader" type="x-shader/x-vertex">

attribute  vec4 vPosition;
attribute  vec4 vNormal;

varying vec4 fColor;
attribute vec2 vTexCoord;
varying vec2 fTexCoord;
varying vec4 fShadowCoord;
varying vec3 fNormal;
varying vec3 fLightDir;

varying vec3 fWorldNormal;


uniform vec4 ambientProduct, diffuseProduct, specularProduct;
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform mediump vec4 lightPosition;
uniform float shininess;
uniform mat3 normalMatrix;

uniform mat3 modelNormalMatrix;
uniform bool twoSided;



uniform mat4 viewMatrix;

uniform mat4 modelMatrix;
uniform mat4 lightViewMatrix;
uniform mat4 lightProjectionMatrix;


varying vec3 fWorldPos;



void main() 
{


    vec3 pos = (modelViewMatrix * vPosition).xyz;
    vec3 light = (viewMatrix * lightPosition).xyz;
    vec3 L = normalize( light - pos );

	
    vec3 E = normalize( -pos );
    vec3 H = normalize( L + E );

    // Transform vertex normal into eye coordinates
       
    vec3 N = normalize( normalMatrix*vNormal.xyz);
    if (twoSided && dot(N, L) < 0.0) {
        N = -N;
    }

    fNormal = N;
    fLightDir = L;

    // Compute terms in the illumination equation
    vec4 ambient = ambientProduct;

    float Kd = max( dot(L, N), 0.0 );
    vec4  diffuse = Kd*diffuseProduct;

    float Ks = pow( max(dot(N, H), 0.0), shininess );
    vec4  specular = Ks * specularProduct;
    
    if( dot(L, N) < 0.0 ) {
	    specular = vec4(0.0, 0.0, 0.0, 1.0);
    } 

    gl_Position = projectionMatrix * modelViewMatrix * vPosition;

    fShadowCoord = lightProjectionMatrix * lightViewMatrix * modelMatrix * vPosition;

    
    fColor = ambient + diffuse +specular;
    
    fColor.a = 1.0;
    // texture coords semplici derivate dalla normale
    fTexCoord = vTexCoord;

    fWorldNormal = normalize(modelNormalMatrix * vNormal.xyz);
    vec4 worldPos = modelMatrix * vPosition;
    fWorldPos = worldPos.xyz;
    

} 
</script>

<script id="fragment-shader" type="x-shader/x-fragment">

precision highp float;

varying vec4 fColor;
varying vec2 fTexCoord;
varying vec4 fShadowCoord;

varying vec3 fNormal;
varying vec3 fLightDir;
varying vec3 fWorldNormal;

 
uniform bool useTexture;
uniform sampler2D uTexture;
uniform sampler2D shadowMap;
uniform bool isLightMarker;
uniform bool receiveShadow;

// Point light shadow maps: one texture for each cubemap face
uniform sampler2D pointShadowMap0; // +X
uniform sampler2D pointShadowMap1; // -X
uniform sampler2D pointShadowMap2; // +Y
uniform sampler2D pointShadowMap3; // -Y
uniform sampler2D pointShadowMap4; // +Z
uniform sampler2D pointShadowMap5; // -Z

uniform mat4 pointLightViewMatrix0;
uniform mat4 pointLightViewMatrix1;
uniform mat4 pointLightViewMatrix2;
uniform mat4 pointLightViewMatrix3;
uniform mat4 pointLightViewMatrix4;
uniform mat4 pointLightViewMatrix5;

uniform mat4 pointLightProjectionMatrix;

uniform bool usePointShadowMap;

varying vec3 fWorldPos;

uniform mediump vec4 lightPosition;


int choosePointShadowFace(vec3 dir)
{
    vec3 absDir = abs(dir);

    if (absDir.x >= absDir.y && absDir.x >= absDir.z) {
        if (dir.x > 0.0) {
            return 0; // +X
        } else {
            return 1; // -X
        }
    }

    if (absDir.y >= absDir.x && absDir.y >= absDir.z) {
        if (dir.y > 0.0) {
            return 2; // +Y
        } else {
            return 3; // -Y
        }
    }

    if (dir.z > 0.0) {
        return 4; // +Z
    } else {
        return 5; // -Z
    }
}

float unpackDepth(vec4 rgbaDepth)
{
    const vec4 bitShift = vec4(
        1.0 / (256.0 * 256.0 * 256.0),
        1.0 / (256.0 * 256.0),
        1.0 / 256.0,
        1.0
    );

    return dot(rgbaDepth, bitShift);
}

float computePointShadow(vec3 worldPos, vec3 worldNormal)
{
    float farPlane = 40.0;
    vec3 lightWorldPos = lightPosition.xyz;
    vec3 dir = worldPos - lightWorldPos;

    int face = choosePointShadowFace(dir);

    vec4 shadowCoord;
    float closestDepth;

    //modifica per bias custom (gpt)
    // direzione dal frammento verso la luce
    vec3 fragToLight = normalize(lightWorldPos - worldPos);

    float ndotl = max(dot(normalize(worldNormal), fragToLight), 0.0);

    // bias piccolo sulle superfici frontali, più alto sugli angoli radenti
    float bias = max(0.003 * (1.0 - ndotl), 0.0002);

    float currentDistance = length(worldPos - lightWorldPos);
    float currentDepth = currentDistance / farPlane;

    //attenzione su gpt
    float quantita_luce=0.0;

    if (face == 0) {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix0 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap0, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }

    else if (face == 1) {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix1 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap1, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }

    else if (face == 2) {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix2 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap2, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }

    else if (face == 3) {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix3 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap3, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }

    else if (face == 4) {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix4 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap4, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }

    else {
        shadowCoord = pointLightProjectionMatrix * pointLightViewMatrix5 * vec4(worldPos, 1.0);
        vec3 projCoords = shadowCoord.xyz / shadowCoord.w;
        projCoords = projCoords * 0.5 + 0.5;

        if (projCoords.x < 0.0 || projCoords.x > 1.0 ||
            projCoords.y < 0.0 || projCoords.y > 1.0 ||
            projCoords.z < 0.0 || projCoords.z > 1.0) {
            return 1.0;
        }

        closestDepth = unpackDepth(texture2D(pointShadowMap5, projCoords.xy));
        return (currentDepth > closestDepth + bias) ? quantita_luce : 1.0;
    }
}

void main(){

    if (isLightMarker) {
        gl_FragColor = vec4(1.0, 1.0, 0.25, 1.0);
        return;
    }

    //vec2 uv = fract(fTexCoord * 8.0);
    vec4 texColor = texture2D(uTexture, fTexCoord);

    
    
    vec3 projCoords = fShadowCoord.xyz / fShadowCoord.w;
    projCoords = projCoords * 0.5 + 0.5;

    float facingLight = normalize(fWorldNormal).y;
    
    

    float shadow = 1.0;

    if (usePointShadowMap && receiveShadow) {
        shadow = computePointShadow(fWorldPos,fWorldNormal);
    }
    else {
        // QUI lasci la tua shadow map vecchia pari pari
        if (receiveShadow && 
            projCoords.x >= 0.0 && projCoords.x <= 1.0 &&
            projCoords.y >= 0.0 && projCoords.y <= 1.0 &&
            projCoords.z >= 0.0 && projCoords.z <= 1.0) {

            float currentDepth = projCoords.z;
            float bias = 0.0005;

            float shadowSum = 0.0;
            float texelSize = 1.0 / 2048.0;

            for (int x = -1; x <= 1; x++) {
                for (int y = -1; y <= 1; y++) {
                    vec2 offset = vec2(float(x), float(y)) * texelSize;
                    float closestDepth = texture2D(shadowMap, projCoords.xy + offset).r;

                    if (currentDepth > closestDepth + bias) {
                        shadowSum += 1.0;
                    }
                }
            }

            float shadowFactor = shadowSum / 9.0;
            shadow = 1.0 - 0.45 * shadowFactor;
        }
    }

    vec4 baseColor = useTexture ? texColor * fColor : fColor;
    gl_FragColor = vec4(baseColor.rgb * shadow, baseColor.a);

    

}
</script>

<script id="shadow-vertex-shader" type="x-shader/x-vertex">
attribute vec4 vPosition;

uniform mat4 lightModelViewMatrix;
uniform mat4 lightProjectionMatrix;
uniform mat4 modelMatrix;
uniform vec4 lightPosition;
uniform bool pointShadowPass;

varying vec3 vWorldPos;

void main()
{
    vec4 worldPos = modelMatrix * vPosition;
    vWorldPos = worldPos.xyz;

    gl_Position = lightProjectionMatrix * lightModelViewMatrix * vPosition;
}
</script>

<script id="shadow-fragment-shader" type="x-shader/x-fragment">
precision highp float;

uniform vec4 lightPosition;
uniform float pointShadowFar;
uniform bool pointShadowPass;

varying vec3 vWorldPos;

vec4 packDepth(float depth)
{
    const vec4 bitShift = vec4(
        256.0 * 256.0 * 256.0,
        256.0 * 256.0,
        256.0,
        1.0
    );

    const vec4 bitMask = vec4(
        0.0,
        1.0 / 256.0,
        1.0 / 256.0,
        1.0 / 256.0
    );

    vec4 res = fract(depth * bitShift);
    res -= res.xxyz * bitMask;
    return res;
}

void main() 
{
    if (pointShadowPass) {
        float dist = length(vWorldPos - lightPosition.xyz);
        dist = dist / pointShadowFar;

        gl_FragColor = packDepth(dist);
    } else {
        float d = gl_FragCoord.z;
        gl_FragColor = vec4(d, d, d, 1.0);
    }
}
</script>

<script id="skybox-vertex-shader" type="x-shader/x-vertex">
attribute vec3 pos;

varying vec3 v_texCoord;

uniform mat4 mvp;

void main()
{
    v_texCoord = pos;
    gl_Position = mvp * vec4(pos, 1.0);
}
</script>
<script id="skybox-fragment-shader" type="x-shader/x-fragment">
precision mediump float;

varying vec3 v_texCoord;

uniform samplerCube skybox;

void main()
{
    gl_FragColor = textureCube(skybox, v_texCoord);
}
</script>
